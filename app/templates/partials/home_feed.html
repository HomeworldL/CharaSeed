{% if site_feed.errors %}
  <div class="error-stack">
    {% for error in site_feed.errors %}
      <div class="error-pill">{{ site_profiles[site].label }} 暂时不可用：{{ error }}</div>
    {% endfor %}
  </div>
{% endif %}

{% if site_feed.results %}
  <div class="result-grid result-grid-home">
    {% include "partials/result_cards.html" %}
  </div>
{% else %}
  <div class="empty-state">
    <p>{{ site_profiles[site].label }} 当前没有可展示的候选结果。</p>
  </div>
{% endif %}
