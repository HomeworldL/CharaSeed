<section class="panel today-panel">
  <div class="section-head">
    <div>
      <p class="eyebrow">Today</p>
      <h2>{{ feed.summary }}</h2>
    </div>
    <button
      hx-get="/fragments/home-feed"
      hx-target="#home-feed"
      hx-indicator="#home-loading"
    >刷新主页候选</button>
  </div>

  <div class="signal-row">
    {% for signal in feed.signals %}
      <span class="signal-chip">{{ signal }}</span>
    {% endfor %}
  </div>

  <div class="site-pill-cluster">
    {% for site in feed.site_order %}
      <button
        type="button"
        class="site-chip-button"
        hx-get="/fragments/home-site-panel?site={{ site }}&refresh_token={{ feed.refresh_token }}"
        hx-target="#home-site-panel"
      >{{ site_profiles[site].label }}</button>
    {% endfor %}
  </div>

  <div id="mixed-feed-empty" class="empty-state">
    <p>正在按站点分批生成候选，先到的结果会先出现。</p>
  </div>

  <div id="mixed-feed-grid" class="feed-grid"></div>

  <div class="feed-loaders" aria-hidden="true">
    {% for site in feed.site_order %}
      <div
        class="feed-loader"
        hx-get="/fragments/home-feed-site-cards?site={{ site }}&refresh_token={{ feed.refresh_token }}"
        hx-trigger="load"
        hx-target="#mixed-feed-grid"
        hx-swap="beforeend"
      ></div>
    {% endfor %}
  </div>
</section>
