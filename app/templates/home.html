{% extends "base.html" %}

{% block title %}主页 | CharaSeed{% endblock %}

{% block content %}
<section class="home-toolbar panel">
  <div>
    <p class="eyebrow">Today Feed</p>
    <h1>今天值得继续归档什么。</h1>
  </div>
  <div class="hero-actions">
    <button
      hx-get="/fragments/home-feed"
      hx-target="#home-feed"
      hx-indicator="#home-loading"
    >刷新主页候选</button>
    <a class="button-secondary" href="/discover">进入搜索页</a>
  </div>
</section>

<div id="home-loading" class="loading-note htmx-indicator">正在生成今日候选流...</div>

<section id="home-feed" hx-get="/fragments/home-feed" hx-trigger="load" hx-indicator="#home-loading">
  <div class="panel">
    <div class="empty-state">
      <p>正在准备你的今日候选流...</p>
    </div>
  </div>
</section>

<section id="home-site-panel" class="home-site-panel-shell">
  <div class="panel">
    <div class="empty-state">
      <p>点击上方某个站点，展开它的候选专区、结果细节和单站刷新。</p>
    </div>
  </div>
</section>
{% endblock %}
